<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokopia Optimizer</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }

        .title {
            font-family: 'Orbitron', monospace;
            letter-spacing: 0.15em;
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .card {
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            background: rgba(30, 27, 75, 0.6);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card:hover {
            border-color: rgba(139, 92, 246, 0.6);
            background: rgba(30, 27, 75, 0.8);
            transform: translateY(-2px);
        }

        .pokemon-badge {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pokemon-badge:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        .item-row {
            padding: 1rem;
            border-bottom: 1px solid rgba(139, 92, 246, 0.1);
            transition: background 0.2s;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-row:hover {
            background: rgba(139, 92, 246, 0.1);
        }

        .score-badge {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #86efac;
        }

        .score-badge.neutral {
            background: rgba(107, 114, 128, 0.2);
            border-color: rgba(107, 114, 128, 0.4);
            color: #d1d5db;
        }

        .score-badge.negative {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-top: none;
            border-radius: 0 0 0.5rem 0.5rem;
            max-height: 300px;
            overflow-y: auto;
            z-index: 10;
        }

        .dropdown-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(139, 92, 246, 0.1);
        }

        .dropdown-item:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .tag {
            display: inline-block;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            margin-right: 0.5rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Icon components
        const ChevronDown = ({ size = 20, className = '' }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        );

        const X = ({ size = 16, className = '' }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const TrendingUp = ({ size = 18, className = '' }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 17"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        function PokopiOptimizer() {
            const [selectedPokemon, setSelectedPokemon] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [showDropdown, setShowDropdown] = useState(false);
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);

            // Load database on mount
            useEffect(() => {
                // Embedded database (hardcoded for standalone HTML)
                const database = {
                    pokemon: [
                        { id: 1, name: "Pikachu", habitat: "Sky", favoriteGroups: ["Electronics", "Round stuff", "Colorful stuff"] },
                        { id: 2, name: "Charizard", habitat: "Mountain", favoriteGroups: ["Lots of fire", "Hard stuff", "Nice breezes"] },
                        { id: 3, name: "Blastoise", habitat: "Water", favoriteGroups: ["Lots of water", "Ocean vibes", "Hard stuff", "Electronics"] },
                        { id: 4, name: "Venusaur", habitat: "Forest", favoriteGroups: ["Cute stuff", "Pretty flowers", "Lots of nature", "Lots of dirt"] },
                        { id: 5, name: "Gyarados", habitat: "Water", favoriteGroups: ["Lots of water", "Hard stuff", "Noisy stuff"] },
                        { id: 6, name: "Arcanine", habitat: "Urban", favoriteGroups: ["Lots of fire", "Hard stuff", "Luxury"] },
                        { id: 7, name: "Lapras", habitat: "Water", favoriteGroups: ["Lots of water", "Nice breezes", "Ocean vibes"] },
                        { id: 8, name: "Machamp", habitat: "Mountain", favoriteGroups: ["Hard stuff", "Exercise", "Construction"] },
                        { id: 9, name: "Gengar", habitat: "Cave", favoriteGroups: ["Spooky stuff", "Gatherings", "Hard stuff"] },
                        { id: 10, name: "Dragonite", habitat: "Sky", favoriteGroups: ["Hard stuff", "Nice breezes", "Luxury"] },
                        { id: 11, name: "Meowth", habitat: "Urban", favoriteGroups: ["Cute stuff", "Round stuff", "Luxury"] },
                        { id: 12, name: "Psyduck", habitat: "Water", favoriteGroups: ["Lots of water", "Cute stuff", "Round stuff"] },
                        { id: 13, name: "Growlithe", habitat: "Urban", favoriteGroups: ["Lots of fire", "Cute stuff", "Hard stuff"] },
                        { id: 14, name: "Tangela", habitat: "Forest", favoriteGroups: ["Lots of nature", "Slender objects", "Soft stuff"] },
                        { id: 15, name: "Scyther", habitat: "Forest", favoriteGroups: ["Sharp stuff", "Slender objects", "Noisy stuff"] },
                        { id: 16, name: "Bulbasaur", habitat: "Forest", favoriteGroups: ["Cute stuff", "Pretty flowers", "Lots of nature"] },
                        { id: 17, name: "Squirtle", habitat: "Water", favoriteGroups: ["Lots of water", "Ocean vibes", "Soft stuff"] },
                        { id: 18, name: "Charmander", habitat: "Mountain", favoriteGroups: ["Lots of fire", "Noisy stuff", "Hard stuff"] },
                        { id: 19, name: "Onix", habitat: "Mountain", favoriteGroups: ["Stone stuff", "Hard stuff", "Sharp stuff"] },
                        { id: 20, name: "Shellos", habitat: "Water", favoriteGroups: ["Lots of water", "Soft stuff", "Ocean vibes"] },
                        { id: 21, name: "Magnemite", habitat: "Mountain", favoriteGroups: ["Metal stuff", "Electronics", "Hard stuff"] },
                        { id: 22, name: "Gastly", habitat: "Cave", favoriteGroups: ["Spooky stuff", "Gatherings", "Cute stuff"] },
                        { id: 23, name: "Zubat", habitat: "Cave", favoriteGroups: ["Spooky stuff", "Round stuff", "Nice breezes"] },
                        { id: 24, name: "Grimer", habitat: "Wasteland", favoriteGroups: ["Garbage", "Lots of dirt", "Spooky stuff"] },
                        { id: 25, name: "Paras", habitat: "Forest", favoriteGroups: ["Lots of nature", "Lots of dirt", "Wooden stuff"] }
                    ],
                    items: [
                        { id: 1, name: "Soft Cushion", groups: ["Soft stuff", "Cute stuff", "Fabric"] },
                        { id: 2, name: "Brick Wall", groups: ["Construction", "Hard stuff", "Stone stuff"] },
                        { id: 3, name: "Water Fountain", groups: ["Lots of water", "Electronics", "Cleanliness"] },
                        { id: 4, name: "Campfire", groups: ["Lots of fire", "Noisy stuff", "Construction"] },
                        { id: 5, name: "Golden Statue", groups: ["Luxury", "Shiny stuff", "Hard stuff"] },
                        { id: 6, name: "Dark Mirror", groups: ["Spooky stuff", "Shiny stuff", "Watching stuff"] },
                        { id: 7, name: "Crystal Ball", groups: ["Complicated stuff", "Shiny stuff", "Spooky stuff"] },
                        { id: 8, name: "Green Plant", groups: ["Lots of nature", "Pretty flowers"] },
                        { id: 9, name: "Ice Sculpture", groups: ["Lots of water", "Hard stuff", "Shiny stuff"] },
                        { id: 10, name: "Metal Bars", groups: ["Metal stuff", "Hard stuff", "Construction"] },
                        { id: 11, name: "Silk Rug", groups: ["Soft stuff", "Fabric", "Luxury"] },
                        { id: 12, name: "Electric Lamp", groups: ["Electronics", "Shiny stuff", "Noisy stuff"] },
                        { id: 13, name: "Pearl Necklace", groups: ["Luxury", "Shiny stuff", "Cute stuff"] },
                        { id: 14, name: "Scale Model", groups: ["Hard stuff", "Metal stuff", "Watching stuff"] },
                        { id: 15, name: "Wooden Cabinet", groups: ["Wooden stuff", "Construction", "Hard stuff"] },
                        { id: 16, name: "Neon Sign", groups: ["Electronics", "Noisy stuff", "Colorful stuff"] },
                        { id: 17, name: "Sludge Bucket", groups: ["Garbage", "Lots of dirt", "Containers"] },
                        { id: 18, name: "Stone Boulder", groups: ["Stone stuff", "Hard stuff", "Construction"] },
                        { id: 19, name: "Ball Toy", groups: ["Round stuff", "Cute stuff", "Play spaces"] },
                        { id: 20, name: "Purple Tapestry", groups: ["Spooky stuff", "Fabric", "Colorful stuff"] },
                        { id: 21, name: "Wind Chime", groups: ["Nice breezes", "Electronics", "Noisy stuff"] },
                        { id: 22, name: "Flower Pot", groups: ["Pretty flowers", "Containers", "Construction"] },
                        { id: 23, name: "Antique Clock", groups: ["Complicated stuff", "Hard stuff", "Watching stuff"] },
                        { id: 24, name: "Glass Vase", groups: ["Shiny stuff", "Luxury", "Containers"] },
                        { id: 25, name: "Rope Bridge", groups: ["Construction", "Nice breezes", "Wooden stuff"] }
                    ]
                };
                setDb(database);
                setLoading(false);
            }, []);

            // Filter Pokemon by search
            const filteredPokemon = useMemo(() => {
                if (!db) return [];
                return db.pokemon.filter(p => 
                    p.name.toLowerCase().includes(searchTerm.toLowerCase()) &&
                    !selectedPokemon.find(sp => sp.id === p.id)
                );
            }, [searchTerm, selectedPokemon, db]);

            // Calculate item rankings
            const rankedItems = useMemo(() => {
                if (!db || selectedPokemon.length === 0) return [];

                return db.items.map(item => {
                    let score = 0;
                    let matchedGroups = new Set();

                    selectedPokemon.forEach(pokemon => {
                        pokemon.favoriteGroups.forEach(faveGroup => {
                            if (item.groups.includes(faveGroup)) {
                                matchedGroups.add(faveGroup);
                                score += 2;
                            }
                        });
                    });

                    return {
                        ...item,
                        score,
                        matchCount: matchedGroups.size,
                    };
                }).sort((a, b) => b.score - a.score);
            }, [selectedPokemon, db]);

            const addPokemon = (pokemon) => {
                if (selectedPokemon.length < 4) {
                    setSelectedPokemon([...selectedPokemon, pokemon]);
                    setSearchTerm('');
                    setShowDropdown(false);
                }
            };

            const removePokemon = (id) => {
                setSelectedPokemon(selectedPokemon.filter(p => p.id !== id));
            };

            if (loading) return <div className="text-center p-8">Loading...</div>;

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-4xl mx-auto">
                        {/* Header */}
                        <div className="mb-12">
                            <h1 className="title text-5xl font-black mb-2 glow-text">POKOPIA</h1>
                            <h2 className="text-xl font-light text-purple-200">Space Optimizer</h2>
                            <p className="text-sm text-gray-400 mt-2">Select up to 4 Pokémon and discover which items will make them happiest</p>
                        </div>

                        {/* Pokemon Selector */}
                        <div className="mb-8 card p-6 rounded-lg">
                            <h3 className="text-sm font-bold text-purple-300 mb-4 uppercase tracking-wide">Select Pokémon</h3>
                            
                            <div className="relative mb-4">
                                <input
                                    type="text"
                                    placeholder="Search Pokémon..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    onFocus={() => setShowDropdown(true)}
                                    className="w-full bg-slate-800 border border-purple-500 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-400 focus:ring-2 focus:ring-purple-500/20"
                                />
                                <ChevronDown size={20} className="absolute right-3 top-3 text-gray-400" />
                                
                                {showDropdown && filteredPokemon.length > 0 && (
                                    <div className="dropdown">
                                        {filteredPokemon.map(pokemon => (
                                            <div
                                                key={pokemon.id}
                                                className="dropdown-item"
                                                onClick={() => addPokemon(pokemon)}
                                            >
                                                <div className="font-semibold">{pokemon.name}</div>
                                                <div className="text-xs text-gray-400">{pokemon.habitat}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Selected Pokemon */}
                            <div className="flex flex-wrap gap-2">
                                {selectedPokemon.map(pokemon => (
                                    <div
                                        key={pokemon.id}
                                        className="pokemon-badge group"
                                    >
                                        <span>{pokemon.name}</span>
                                        <button
                                            onClick={() => removePokemon(pokemon.id)}
                                            className="ml-1 opacity-70 group-hover:opacity-100"
                                        >
                                            <X size={16} />
                                        </button>
                                    </div>
                                ))}
                                {selectedPokemon.length === 0 && (
                                    <span className="text-gray-500 text-sm">No Pokémon selected</span>
                                )}
                            </div>

                            <div className="mt-3 text-xs text-gray-400">
                                {selectedPokemon.length}/4 selected
                            </div>
                        </div>

                        {/* Items Ranking */}
                        {selectedPokemon.length > 0 && (
                            <div className="card p-6 rounded-lg">
                                <div className="flex items-center gap-2 mb-4">
                                    <TrendingUp size={18} className="text-purple-400" />
                                    <h3 className="text-sm font-bold text-purple-300 uppercase tracking-wide">Recommended Items</h3>
                                </div>

                                <div className="space-y-0">
                                    {rankedItems.map((item, idx) => {
                                        const scoreClass = item.score > 0 ? '' : item.score < 0 ? 'negative' : 'neutral';
                                        return (
                                            <div key={item.id} className="item-row">
                                                <div className="flex items-start justify-between">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-3 mb-2">
                                                            <span className="text-xs font-bold text-gray-400 w-6">#{idx + 1}</span>
                                                            <h4 className="font-semibold text-white">{item.name}</h4>
                                                            <span className={`score-badge ${scoreClass}`}>
                                                                {item.score > 0 ? '+' : ''}{item.score}
                                                            </span>
                                                        </div>
                                                        <div className="ml-9">
                                                            {item.groups.map(tag => (
                                                                <span key={tag} className="tag">{tag}</span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div className="text-right text-xs text-gray-400">
                                                        <div>{item.matchCount} group matches</div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {selectedPokemon.length === 0 && (
                            <div className="empty-state card rounded-lg p-12">
                                <p className="text-gray-400">Select Pokémon to see recommended items</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<PokopiOptimizer />, document.getElementById('root'));
    </script>
</body>
</html>
